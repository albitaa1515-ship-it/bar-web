<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gazuza Gastrobar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      background: #000;
    }

    h1 {
      margin: 0;
      font-size: 2.5em;
    }

    .section {
      padding: 40px 20px;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      margin: 10px;
      background: #e63946;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    .btn:hover {
      background: #ff4d5a;
    }

    form {
      max-width: 400px;
      margin: auto;
      text-align: left;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }

    footer {
      padding: 20px;
      background: #000;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>Gazuza Gastrobar</h1>
  <p>Buen comer, buen beber, mejor ambiente</p>
</header>

<div class="section">
  <h2>📍 Dónde estamos</h2>
  <p>Pasarón de la Vera, Cáceres</p>
</div>

<div class="section">
  <h2>🕒 Horario</h2>
  <p>Lunes a Domingo: 12:00 - 00:00</p>
</div>

<div class="section">
  <h2>📸 Síguenos</h2>
  <a class="btn" href="https://www.instagram.com/gazuza_gastrobar/" target="_blank">Instagram</a>
</div>

<div class="section">
  <h2>📅 Reservar mesa</h2>

  <a class="btn" href="https://wa.me/34616893649?text=Hola,%20quiero%20reservar%20una%20mesa%20en%20Gazuza%20Gastrobar" target="_blank">
    Reservar por WhatsApp
  </a>

  <h3>O envíanos una solicitud</h3>

  <form action="https://formspree.io/f/TU_ID" method="POST">
    <input type="text" name="nombre" placeholder="Tu nombre" required>
    <input type="tel" name="telefono" placeholder="Teléfono" required>
    <input type="date" name="fecha" required>
    <input type="time" name="hora" required>
    <input type="number" name="personas" placeholder="Número de personas" required>
    <textarea name="mensaje" placeholder="Comentario"></textarea>
    <button class="btn" type="submit">Enviar reserva</button>
  </form>
</div>

<footer>
  © 2026 Gazuza Gastrobar
</footer>

</body>
</html>
